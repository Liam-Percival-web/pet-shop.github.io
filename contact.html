<body>
    <header>
        <h1>Pretty Paws Pet Shop</h1>
        <nav>
            <ul>

                <li><a href="index.HTML">Home</a></li>

                <li><a href="products.HTML">Product Page</a></li>

                <li><a href="services.HTML">Services</a></li>

                <li><a href="about.HTML">About us </a></li>

                <li><a href="contact.HTML">Contact Page</a></li>

            </ul>
        </nav>
    </header>

    <main>
        <form action="" method="post">
        <h2>Contact Us</h2>
        <p>
        Complete the form below if you have any questions or comments.
        </p>
        <div>
            <label for="name">Enter your name</label><br>
            <input type="text" id="name" name="name" value="John Doe" required>
        </div>
    
        <div>
            <label for="email">Enter your Email</label><br>
            <input type="email" id="email" name="email" value="John.Doe@Example.com" required>
        </div>
    
        <div>
            <label for="subject">Subject</label><br>
            <input type="text" id="subject" name="subject" value="Enter subject here" required>
        </div>
    
        <div>
            <label for="message">Message</label><br>
            <textarea id="message" name="message" rows="6" required>Please give us feedback to make our Lovely pet shop, better for our beloved customers?
            </textarea>
        </div>
    
        <button type="submit">Send Message</button>
    
    </form>
    </main>
    
    <footer>
        <p>&copy; 2026 Pretty Paws Pet Shop</p>
    </footer>
</body>
